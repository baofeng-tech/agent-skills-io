name: Unified Skill Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UPSTREAM_BRANCH: main

on:
  workflow_dispatch:
    inputs:
      selection:
        description: "Sync scope"
        required: false
        default: changed
        type: choice
        options:
          - changed
          - all
      skills:
        description: "Optional comma-separated skill list"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Plan only, skip copy/build/test"
        required: false
        default: false
        type: boolean
      run_llm_step:
        description: "Run the repo-local skill-refinement helper over changed AISA API skills"
        required: false
        default: false
        type: boolean
      llm_apply:
        description: "Apply repo-local skill-refinement helper output to targetSkills"
        required: false
        default: false
        type: boolean
      sync_repo_skills:
        description: "Sync global Codex *-all skills into .agents/skills first"
        required: false
        default: true
        type: boolean
      run_self_hosted_publish:
        description: "Also run the optional self-hosted publish lane"
        required: false
        default: false
        type: boolean
      sync_adjacent_repos:
        description: "In self-hosted mode, sync downstream GitHub publish repos"
        required: false
        default: true
        type: boolean
      adjacent_targets:
        description: "Comma-separated downstream GitHub targets: all, agentskills-so, agentskill-sh, claude, claude-marketplace, hermes"
        required: false
        default: "all"
        type: string
      push_adjacent_repos:
        description: "In self-hosted mode, commit and push synced downstream repos"
        required: false
        default: true
        type: boolean
      clawhub_publish:
        description: "In self-hosted mode, continue into ClawHub batch publish"
        required: false
        default: both
        type: choice
        options:
          - none
          - skill
          - plugin
          - both
      clawhub_dry_run:
        description: "In self-hosted mode, pass --dry-run to ClawHub publish"
        required: false
        default: false
        type: boolean
      install_clawhub_cli:
        description: "In self-hosted mode, install or refresh the ClawHub CLI before publish"
        required: false
        default: false
        type: boolean
      hermes_publish_mode:
        description: "In self-hosted mode, Hermes publish path"
        required: false
        default: repo-sync
        type: choice
        options:
          - repo-sync
          - cli
      diagnosis_doc_update:
        description: "Update suspicious diagnosis snapshot in rules doc"
        required: false
        default: true
        type: boolean
      run_suspicious_repair:
        description: "After diagnosis, remediate matching suspicious artifacts and republish them"
        required: false
        default: false
        type: boolean
      suspicious_artifacts:
        description: "Optional comma-separated ClawHub-owned artifact keys to target"
        required: false
        default: ""
        type: string
      suspicious_max_artifacts:
        description: "Optional cap for auto-selected suspicious artifacts"
        required: false
        default: "0"
        type: string
      run_breakout_rollout:
        description: "Run the dedicated breakout rollout lane"
        required: false
        default: false
        type: boolean
      breakout_skills:
        description: "Optional comma-separated source skill names for breakout rollout"
        required: false
        default: ""
        type: string
      breakout_publish:
        description: "Publish breakout skills/plugins after rollout"
        required: false
        default: both
        type: choice
        options:
          - none
          - skill
          - plugin
          - both
  schedule:
    - cron: "21 */4 * * *"

concurrency:
  group: unified-skill-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-build-test:
    runs-on: ubuntu-latest
    env:
      PIPELINE_SELECTION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.selection || vars.AUTO_PIPELINE_SELECTION || 'changed' }}
      PIPELINE_SKILLS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skills || '' }}
      PIPELINE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || vars.AUTO_PIPELINE_DRY_RUN || 'false' }}
      PIPELINE_RUN_LLM_STEP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_llm_step || vars.AUTO_RUN_LLM_STEP || 'false' }}
      PIPELINE_LLM_APPLY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.llm_apply || vars.AUTO_LLM_APPLY || 'false' }}
      PIPELINE_SYNC_REPO_SKILLS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sync_repo_skills || vars.AUTO_SYNC_REPO_SKILLS || 'true' }}
      PIPELINE_DIAGNOSIS_DOC_UPDATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.diagnosis_doc_update || vars.AUTO_DIAGNOSIS_DOC_UPDATE || 'true' }}
      AISA_API_KEY: ${{ secrets.AISA_API_KEY }}
      UPSTREAM_REPO_TOKEN: ${{ secrets.UPSTREAM_REPO_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip PyYAML

      - name: Run unified skill pipeline
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_URL="https://github.com/AIsa-team/agent-skills.git"
          if [[ -n "${UPSTREAM_REPO_TOKEN:-}" ]]; then
            UPSTREAM_URL="https://x-access-token:${UPSTREAM_REPO_TOKEN}@github.com/AIsa-team/agent-skills.git"
          fi

          EXTRA_ARGS=("--upstream-branch" "${UPSTREAM_BRANCH}" "--upstream-repo-url" "$UPSTREAM_URL")

          if [[ -n "${PIPELINE_SKILLS:-}" ]]; then
            EXTRA_ARGS+=("--skills" "$PIPELINE_SKILLS")
          else
            EXTRA_ARGS+=("--selection" "${PIPELINE_SELECTION:-changed}")
          fi

          if [[ "${PIPELINE_RUN_LLM_STEP:-false}" == "true" ]]; then
            EXTRA_ARGS+=("--run-llm-step" "--llm-if-available")
            if [[ "${PIPELINE_LLM_APPLY:-false}" == "true" ]]; then
              EXTRA_ARGS+=("--llm-apply")
            fi
            if [[ "${PIPELINE_SYNC_REPO_SKILLS:-true}" == "true" ]]; then
              EXTRA_ARGS+=("--sync-repo-skills")
            fi
          fi

          if [[ "${PIPELINE_DRY_RUN:-false}" == "true" ]]; then
            EXTRA_ARGS+=("--dry-run" "--skip-build" "--skip-test")
          fi

          python3 scripts/unified_skill_pipeline.py "${EXTRA_ARGS[@]}"

      - name: Generate ClawHub suspicious diagnosis JSON
        if: ${{ success() && env.PIPELINE_DRY_RUN != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          DOC_MODE="skip"
          if [[ "${PIPELINE_DIAGNOSIS_DOC_UPDATE:-true}" == "true" ]]; then
            DOC_MODE="update"
          fi
          python3 scripts/clawhub_suspicious_diagnosis.py --doc-mode "$DOC_MODE"

      - name: Commit regenerated outputs
        if: ${{ success() && env.PIPELINE_DRY_RUN != 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No repo changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "chore: sync upstream, rebuild layers, and refresh diagnosis"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-skill-pipeline-artifacts
          path: |
            targets/unified-pipeline-state.json
            targets/release-layer-test-report-2026-04-17.json
            targets/clawhub-publish-state.json
            targets/clawhub-live-status.json
            targets/clawhub-suspicious-diagnosis.json
            targetSkills/index.json
            targetSkills/index.md
            targetSkills/well-known-skills-index.json
          if-no-files-found: ignore

  diagnosis-pr:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true' }}
    needs: sync-build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create diagnosis PR when changes exist
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          commit-message: "chore: refresh clawhub suspicious diagnosis"
          title: "chore: refresh ClawHub suspicious diagnosis snapshot"
          body: |
            Automated update from unified skill pipeline:
            - refresh `targets/clawhub-suspicious-diagnosis.json`
            - refresh auto snapshot block in suspicious-rules doc
          branch: "bot/clawhub-suspicious-diagnosis"
          delete-branch: true
          add-paths: |
            targets/clawhub-suspicious-diagnosis.json
            targets/clawhub-suspicious-causes-and-fixes-2026-04-25.md

  self-hosted-publish:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.run_self_hosted_publish == 'true') || (github.event_name == 'schedule' && vars.AUTO_FULL_PLATFORM_PUBLISH == 'true') }}
    needs: sync-build-test
    runs-on: self-hosted
    env:
      PIPELINE_SELECTION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.selection || vars.AUTO_PIPELINE_SELECTION || 'changed' }}
      PIPELINE_SKILLS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skills || '' }}
      PIPELINE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || vars.AUTO_PIPELINE_DRY_RUN || 'false' }}
      PIPELINE_RUN_LLM_STEP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_llm_step || vars.AUTO_RUN_LLM_STEP || 'false' }}
      PIPELINE_LLM_APPLY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.llm_apply || vars.AUTO_LLM_APPLY || 'false' }}
      PIPELINE_SYNC_REPO_SKILLS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sync_repo_skills || vars.AUTO_SYNC_REPO_SKILLS || 'true' }}
      PIPELINE_SYNC_ADJACENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sync_adjacent_repos || vars.AUTO_SYNC_ADJACENT_REPOS || 'true' }}
      PIPELINE_ADJACENT_TARGETS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.adjacent_targets || vars.AUTO_ADJACENT_TARGETS || 'all' }}
      PIPELINE_PUSH_ADJACENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_adjacent_repos || vars.AUTO_PUSH_ADJACENT_REPOS || 'true' }}
      PIPELINE_CLAWHUB_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clawhub_publish || vars.AUTO_CLAWHUB_PUBLISH || 'both' }}
      PIPELINE_CLAWHUB_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clawhub_dry_run || vars.AUTO_CLAWHUB_DRY_RUN || 'false' }}
      PIPELINE_INSTALL_CLAWHUB_CLI: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.install_clawhub_cli || vars.AUTO_INSTALL_CLAWHUB_CLI || 'false' }}
      AISA_API_KEY: ${{ secrets.AISA_API_KEY }}
      UPSTREAM_REPO_TOKEN: ${{ secrets.UPSTREAM_REPO_TOKEN }}
      DOWNSTREAM_REPO_TOKEN: ${{ secrets.DOWNSTREAM_REPO_TOKEN }}
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      CLAWHUB_TOKEN_2: ${{ secrets.CLAWHUB_TOKEN_2 }}
      CLAWHUB_TOKEN_3: ${{ secrets.CLAWHUB_TOKEN_3 }}
      PUBLISH_REPOS_ROOT: ${{ github.workspace }}/publish-repos
      PUBLISH_AGENTSKILLS_SO_DEST: ${{ github.workspace }}/publish-repos/agent-skills-so
      PUBLISH_AGENTSKILL_SH_DEST: ${{ github.workspace }}/publish-repos/agent-skills-public
      PUBLISH_CLAUDE_DEST: ${{ github.workspace }}/publish-repos/Aisa-One-Skills-Claude
      PUBLISH_CLAUDE_MARKETPLACE_DEST: ${{ github.workspace }}/publish-repos/Aisa-One-Plugins-Claude
      PUBLISH_HERMES_DEST: ${{ github.workspace }}/publish-repos/Aisa-One-Skills-Hermes
      PUBLISH_HERMES_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hermes_publish_mode || vars.AUTO_HERMES_PUBLISH_MODE || 'repo-sync' }}
      HERMES_PUBLISH_REPO: ${{ vars.HERMES_PUBLISH_REPO || 'baofeng-tech/Aisa-One-Skills-Hermes' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip PyYAML

      - name: Set up Node for optional ClawHub CLI install
        if: ${{ env.PIPELINE_CLAWHUB_PUBLISH != 'none' && env.PIPELINE_INSTALL_CLAWHUB_CLI == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Load local credential fallbacks for self-hosted runner
        shell: bash
        run: |
          set -euo pipefail

          ACCOUNTS_FILE=""
          for candidate in \
            "$GITHUB_WORKSPACE/example/accounts" \
            "/mnt/d/workplace/agent-skills-io/example/accounts"
          do
            if [[ -f "$candidate" ]]; then
              ACCOUNTS_FILE="$candidate"
              break
            fi
          done

          if [[ -z "$ACCOUNTS_FILE" ]]; then
            echo "No local accounts fallback found."
            exit 0
          fi

          python3 - "$ACCOUNTS_FILE" "$GITHUB_ENV" <<'PY'
          import os
          import sys
          from pathlib import Path

          accounts_path = Path(sys.argv[1])
          env_path = Path(sys.argv[2])
          raw: dict[str, str] = {}
          for line in accounts_path.read_text(encoding="utf-8", errors="ignore").splitlines():
              stripped = line.strip()
              if not stripped or stripped.startswith("#") or "=" not in stripped:
                  continue
              key, value = stripped.split("=", 1)
              raw[key.strip()] = value.strip()

          fallbacks = {
              "AISA_API_KEY": raw.get("AISA_API_KEY", ""),
              "UPSTREAM_REPO_TOKEN": raw.get("UPSTREAM_REPO_TOKEN") or raw.get("GITHUB_TOKEN", ""),
              "DOWNSTREAM_REPO_TOKEN": raw.get("DOWNSTREAM_REPO_TOKEN") or raw.get("GITHUB_TOKEN", ""),
              "CLAWHUB_TOKEN": raw.get("CLAWHUB_TOKEN") or raw.get("clawhub_ApI_token", ""),
              "CLAWHUB_TOKEN_2": raw.get("CLAWHUB_TOKEN_2") or raw.get("clawhub_ApI_token2", ""),
              "CLAWHUB_TOKEN_3": raw.get("CLAWHUB_TOKEN_3") or raw.get("clawhub_ApI_token3", ""),
          }

          exports = {key: value for key, value in fallbacks.items() if value and not os.environ.get(key)}
          if not exports:
              print("No self-hosted fallback vars were needed.")
              raise SystemExit(0)

          with env_path.open("a", encoding="utf-8") as handle:
              for key, value in exports.items():
                  handle.write(f"{key}<<__EOF__\n{value}\n__EOF__\n")
          print("Loaded self-hosted fallback vars:", ", ".join(sorted(exports)))
          PY

      - name: Install or refresh ClawHub CLI
        if: ${{ env.PIPELINE_CLAWHUB_PUBLISH != 'none' && env.PIPELINE_INSTALL_CLAWHUB_CLI == 'true' }}
        shell: bash
        env:
          CLAWHUB_CLI_VERSION: ${{ vars.CLAWHUB_CLI_VERSION || 'latest' }}
        run: |
          set -euo pipefail
          npm install -g "clawhub@${CLAWHUB_CLI_VERSION}"
          command -v clawhub >/dev/null
          clawhub --version || true

      - name: Verify publish tooling
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${PIPELINE_CLAWHUB_PUBLISH:-none}" != "none" ]]; then
            if ! command -v clawhub >/dev/null 2>&1; then
              echo "clawhub CLI is missing. Preinstall it on the self-hosted runner or re-run with install_clawhub_cli=true." >&2
              exit 1
            fi
          fi

          if [[ "${PUBLISH_HERMES_MODE:-repo-sync}" == "cli" ]]; then
            if ! command -v hermes >/dev/null 2>&1; then
              echo "Hermes CLI is required when hermes_publish_mode=cli." >&2
              exit 1
            fi
            hermes version || true
          elif command -v hermes >/dev/null 2>&1; then
            hermes version || true
          else
            echo "Hermes CLI not found on runner. Current repo publish only syncs hermes-release into GitHub, so the CLI is optional."
          fi

      - name: Fast-forward self-hosted checkout to latest main
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${GITHUB_REF_NAME}"
          git merge --ff-only FETCH_HEAD

      - name: Prepare downstream publish repos
        if: ${{ env.PIPELINE_SYNC_ADJACENT == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$PUBLISH_REPOS_ROOT"
          SELECTED_TARGETS=",${PIPELINE_ADJACENT_TARGETS// /},"

          target_enabled() {
            local target="$1"
            [[ "$SELECTED_TARGETS" == *,all,* || "$SELECTED_TARGETS" == *,"$target",* ]]
          }

          ensure_repo() {
            local repo="$1"
            local ref="$2"
            local dest="$3"
            local clone_url="https://github.com/${repo}.git"

            if [[ -d "$dest/.git" ]]; then
              git -C "$dest" fetch origin "$ref"
              git -C "$dest" checkout "$ref"
              git -C "$dest" pull --ff-only origin "$ref"
            else
              rm -rf "$dest"
              git clone --branch "$ref" --single-branch "$clone_url" "$dest"
            fi
          }

          if target_enabled "agentskills-so"; then
            ensure_repo "baofeng-tech/agent-skills-so" "main" "$PUBLISH_AGENTSKILLS_SO_DEST"
          fi
          if target_enabled "agentskill-sh"; then
            ensure_repo "baofeng-tech/agent-skills" "main" "$PUBLISH_AGENTSKILL_SH_DEST"
          fi
          if target_enabled "claude"; then
            ensure_repo "baofeng-tech/Aisa-One-Skills-Claude" "main" "$PUBLISH_CLAUDE_DEST"
          fi
          if target_enabled "claude-marketplace"; then
            ensure_repo "baofeng-tech/Aisa-One-Plugins-Claude" "main" "$PUBLISH_CLAUDE_MARKETPLACE_DEST"
          fi
          if [[ "${PUBLISH_HERMES_MODE:-repo-sync}" != "cli" ]] && target_enabled "hermes"; then
            ensure_repo "baofeng-tech/Aisa-One-Skills-Hermes" "main" "$PUBLISH_HERMES_DEST"
          fi

      - name: Run self-hosted publish lane
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_URL="https://github.com/AIsa-team/agent-skills.git"
          if [[ -n "${UPSTREAM_REPO_TOKEN:-}" ]]; then
            UPSTREAM_URL="https://x-access-token:${UPSTREAM_REPO_TOKEN}@github.com/AIsa-team/agent-skills.git"
          fi

          EXTRA_ARGS=("--upstream-branch" "${UPSTREAM_BRANCH}" "--upstream-repo-url" "$UPSTREAM_URL")

          if [[ -n "${PIPELINE_SKILLS:-}" ]]; then
            EXTRA_ARGS+=("--skills" "$PIPELINE_SKILLS")
          else
            EXTRA_ARGS+=("--selection" "${PIPELINE_SELECTION:-changed}")
          fi

          if [[ "${PIPELINE_RUN_LLM_STEP:-true}" == "true" ]]; then
            EXTRA_ARGS+=("--run-llm-step" "--llm-if-available")
            if [[ "${PIPELINE_LLM_APPLY:-true}" == "true" ]]; then
              EXTRA_ARGS+=("--llm-apply")
            fi
            if [[ "${PIPELINE_SYNC_REPO_SKILLS:-true}" == "true" ]]; then
              EXTRA_ARGS+=("--sync-repo-skills")
            fi
          fi

          if [[ "${PIPELINE_SYNC_ADJACENT:-true}" == "true" ]]; then
            EXTRA_ARGS+=("--sync-adjacent-repos" "--adjacent-targets" "${PIPELINE_ADJACENT_TARGETS:-all}")
          fi

          if [[ "${PIPELINE_CLAWHUB_PUBLISH:-none}" != "none" ]]; then
            EXTRA_ARGS+=("--clawhub-publish" "${PIPELINE_CLAWHUB_PUBLISH}")
            if [[ "${PIPELINE_CLAWHUB_DRY_RUN:-false}" == "true" ]]; then
              EXTRA_ARGS+=("--clawhub-dry-run")
            fi
          fi

          if [[ "${PIPELINE_DRY_RUN:-false}" == "true" ]]; then
            EXTRA_ARGS+=("--dry-run" "--skip-build" "--skip-test")
          fi

          python3 scripts/unified_skill_pipeline.py "${EXTRA_ARGS[@]}"

      - name: Refresh suspicious diagnosis
        if: ${{ success() && env.PIPELINE_DRY_RUN != 'true' }}
        run: python3 scripts/clawhub_suspicious_diagnosis.py --doc-mode update

      - name: Commit self-hosted repo changes
        if: ${{ success() && env.PIPELINE_DRY_RUN != 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No repo changes to commit."
            exit 0
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No staged repo changes."
            exit 0
          fi

          git commit -m "chore: self-hosted publish remediation updates"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"

      - name: Commit and push downstream publish repos
        if: ${{ success() && env.PIPELINE_SYNC_ADJACENT == 'true' && env.PIPELINE_PUSH_ADJACENT == 'true' && env.PIPELINE_DRY_RUN != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          SELECTED_TARGETS=",${PIPELINE_ADJACENT_TARGETS// /},"

          target_enabled() {
            local target="$1"
            [[ "$SELECTED_TARGETS" == *,all,* || "$SELECTED_TARGETS" == *,"$target",* ]]
          }

          commit_and_push() {
            local repo_path="$1"
            local label="$2"
            local repo="$3"
            local ref="$4"

            if [[ ! -d "$repo_path/.git" ]]; then
              echo "Skip $label: repo not prepared."
              return 0
            fi

            if [[ -z "$(git -C "$repo_path" status --porcelain)" ]]; then
              echo "No changes in $label."
              return 0
            fi

            git -C "$repo_path" config user.name "github-actions[bot]"
            git -C "$repo_path" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C "$repo_path" add -A

            if git -C "$repo_path" diff --cached --quiet; then
              echo "No staged changes in $label."
              return 0
            fi

            git -C "$repo_path" commit -m "chore: publish from unified skill pipeline"
            if [[ -n "${DOWNSTREAM_REPO_TOKEN:-}" ]]; then
              git -C "$repo_path" push "https://x-access-token:${DOWNSTREAM_REPO_TOKEN}@github.com/${repo}.git" "HEAD:${ref}"
            else
              git -C "$repo_path" push origin "HEAD:${ref}"
            fi
          }

          if target_enabled "agentskills-so"; then
            commit_and_push "$PUBLISH_AGENTSKILLS_SO_DEST" "agent-skills-so" "baofeng-tech/agent-skills-so" "main"
          fi
          if target_enabled "agentskill-sh"; then
            commit_and_push "$PUBLISH_AGENTSKILL_SH_DEST" "agent-skills-public" "baofeng-tech/agent-skills" "main"
          fi
          if target_enabled "claude"; then
